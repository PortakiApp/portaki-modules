name: Feature request
description: Suggest a change to an official module
labels: ["enhancement"]
body:
  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - weather
        - new module idea
        - monorepo / CI
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
    validations:
      required: true
