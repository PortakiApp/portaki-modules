name: Publish Java (GitHub Packages)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "modules/pre-arrival-form/backend/**"
      - ".github/workflows/publish-maven-github-packages.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-maven-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-pre-arrival-form-backend:
    name: mvn deploy → GPR (pre-arrival-form backend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maven (GPR) + JDK — SDK depuis Maven Central
        uses: PortakiApp/portaki-sdk/.github/actions/maven-gpr-install-java-sdk@main
        with:
          gpr-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy JAR
        working-directory: modules/pre-arrival-form/backend
        run: mvn -B deploy
