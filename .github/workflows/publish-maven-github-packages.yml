name: Java packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "modules/pre-arrival-form/backend/**"
      - "modules/ical-sync/backend/**"
      - ".github/workflows/publish-maven-github-packages.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-maven-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-module-backend:
    name: mvn deploy → GPR (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: pre-arrival-form
            working_dir: modules/pre-arrival-form/backend
          - module: ical-sync
            working_dir: modules/ical-sync/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maven (GPR) + JDK — SDK depuis Maven Central
        uses: PortakiApp/portaki-sdk/.github/actions/maven-gpr-install-java-sdk@main
        with:
          gpr-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy JAR
        working-directory: ${{ matrix.working_dir }}
        run: mvn -B deploy
