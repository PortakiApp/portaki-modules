name: Publish Java (GitHub Packages)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
    paths:
      - "modules/pre-arrival-form/backend/**"
      - ".github/workflows/publish-maven-github-packages.yml"
      - ".github/maven-gpr-settings.xml"
      - ".github/scripts/configure-maven-gpr.sh"
      - ".github/scripts/ci-install-portaki-java-sdk.sh"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-maven-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-pre-arrival-form-backend:
    name: mvn deploy → GPR (pre-arrival-form backend)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout portaki-sdk (Java SDK)
        uses: actions/checkout@v4
        with:
          repository: PortakiApp/portaki-sdk
          path: .deps/portaki-sdk
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Maven settings.xml (GitHub Packages)
        env:
          GPR_ACTOR: ${{ github.actor }}
          GPR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/configure-maven-gpr.sh

      - name: Install portaki-module-sdk into local Maven repo
        run: bash .github/scripts/ci-install-portaki-java-sdk.sh

      - name: Deploy JAR
        working-directory: modules/pre-arrival-form/backend
        run: mvn -B deploy
