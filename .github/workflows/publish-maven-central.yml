# Publie les JAR backends (app.portaki.module:*) sur Maven Central — uniquement après un **Checks** vert sur `main**
# (ou manuel). Même stack que portaki-sdk (OSSRH + GPG + central-publishing-maven-plugin).
#
# Les modules `modules/*/backend` sont découverts par script ; un job matrix déploie en parallèle
# uniquement les modules dont les fichiers ont changé sur le commit déclencheur (ou tout si
# workflow_dispatch / workflow modifié).
#
# Secrets : OSSRH_USERNAME, OSSRH_TOKEN, GPG_PRIVATE_KEY, GPG_PASSPHRASE
# Namespace `app.portaki.module` autorisé sur le Central Portal.

name: Java to Central

run-name: maven-central-${{ github.run_id }}

on:
  workflow_run:
    workflows: [Checks]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: maven-central-modules-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "21"
  MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
  MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
  MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

jobs:
  gate:
    name: Gate
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.pro.outputs.proceed }}
      head_sha: ${{ steps.pro.outputs.head_sha }}
      matched: ${{ steps.paths.outputs.matched }}
    steps:
      - id: pro
        env:
          WR_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WR_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WR_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "head_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${WR_CONCLUSION}" != "success" ] || [ "${WR_BRANCH}" != "main" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "head_sha=" >> "$GITHUB_OUTPUT"
            echo "matched=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "proceed=true" >> "$GITHUB_OUTPUT"
          echo "head_sha=${WR_SHA}" >> "$GITHUB_OUTPUT"

      - name: Checkout (for path filter)
        if: steps.pro.outputs.proceed == 'true' && github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pro.outputs.head_sha }}
          fetch-depth: 1

      - id: paths
        if: steps.pro.outputs.proceed == 'true'
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "matched=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          matched=false
          while IFS= read -r line; do
            [ -z "${line}" ] && continue
            case "${line}" in
              modules/*/backend/*|.github/workflows/publish-maven-central.yml)
                matched=true
                break
                ;;
            esac
          done < <(git show --pretty="" --name-only HEAD)
          echo "matched=${matched}" >> "$GITHUB_OUTPUT"

  discover-maven:
    name: Discover Maven deploy matrix
    needs: [gate]
    if: needs.gate.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    outputs:
      any: ${{ steps.set.outputs.any }}
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Checkout
        if: needs.gate.outputs.matched == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.head_sha }}

      - id: set
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          MATCHED: ${{ needs.gate.outputs.matched }}
        run: |
          set -euo pipefail
          DELIM="JAVA_MATRIX_JSON_EOF"
          if [[ "${MATCHED}" != "true" ]]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
            {
              echo "matrix<<${DELIM}"
              echo '{"include":[]}'
              echo "${DELIM}"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          bash .github/scripts/discover-java-backend-matrix.sh deploy >> "$GITHUB_OUTPUT"

  publish:
    name: ${{ matrix.job_label }}
    needs: [gate, discover-maven]
    if: >
      needs.gate.outputs.proceed == 'true' &&
      needs.gate.outputs.matched == 'true' &&
      needs.discover-maven.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover-maven.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.gate.outputs.head_sha }}

      - name: Require Central Portal token
        run: |
          if [ -z "${MAVEN_USERNAME}" ] || [ -z "${MAVEN_PASSWORD}" ]; then
            echo "::error::Configure OSSRH_USERNAME and OSSRH_TOKEN (Central Portal user token)."
            exit 1
          fi

      - name: Require GPG signing secrets
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE_CHECK: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "${GPG_PRIVATE_KEY}" ] || [ -z "${GPG_PASSPHRASE_CHECK}" ]; then
            echo "::error::Configure GPG_PRIVATE_KEY (armored) and GPG_PASSPHRASE."
            exit 1
          fi

      - name: Set up JDK and Maven Central
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Assert release version (no SNAPSHOT)
        working-directory: ${{ matrix.java_dir }}
        run: |
          set -euo pipefail
          V=$(mvn -B -ntp -q -DforceStdout help:evaluate -Dexpression=project.version | tr -d '\r\n')
          echo "${{ matrix.java_dir }} -> ${V}"
          case "${V}" in *-SNAPSHOT*)
            echo "::error::Version must not be SNAPSHOT for Central (got ${V})."
            exit 1
            ;;
          esac

      - name: Deploy to Central
        working-directory: ${{ matrix.java_dir }}
        run: mvn --batch-mode -ntp deploy -DskipTests -P central-deploy
