name: Publish modules (GitHub Packages)

# Aligné sur PortakiApp/portaki-sdk : même registre, même schéma de versions.
# Ne publie PAS @portakiapp/module-sdk : ce paquet est déjà publié depuis portaki-sdk ;
# republier le même nom depuis un autre dépôt → 403 write_package.

on:
  push:
    branches:
      - develop
    paths:
      - "modules/**"
      - "scripts/**"
      - ".npmrc"
      - ".github/workflows/publish-github-packages.yml"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      version:
        description: "Version semver (ex. 0.2.0). Vide = versions actuelles des package.json."
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-gpr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: pnpm publish → GitHub Packages
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://npm.pkg.github.com"

      - name: Install dependencies
        run: pnpm install

      - name: Version CI major.minor.run (push sur develop)
        if: github.event_name == 'push'
        run: node scripts/bump-workspace-versions.mjs ci-run ${{ github.run_number }}

      - name: Version manuelle (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: node scripts/bump-workspace-versions.mjs set "${{ github.event.inputs.version }}"

      - name: Version depuis release GitHub
        if: github.event_name == 'release'
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name }}"
          RAW="${TAG#modules-v}"
          RAW="${RAW#v}"
          node scripts/bump-workspace-versions.mjs set "$RAW"

      - name: Install after version bump
        run: pnpm install --no-frozen-lockfile

      - name: Publish packages (hors module-sdk — voir portaki-sdk)
        shell: bash
        run: |
          set -euo pipefail
          publish_pkg() {
            pnpm publish --filter "@portakiapp/$1" --access restricted --no-git-checks
          }
          publish_pkg module-train
          publish_pkg module-events
          publish_pkg module-rules
          publish_pkg module-appliances
          publish_pkg module-checklist
          publish_pkg module-pre-arrival-form
