# Publication **manuelle** d’un paquet (ou tous) — débogage / hotfix.
# Publication automatique semver : workflow **Checks** (`ci.yml`), job `publish-npm-registry`.

name: Publish npm

run-name: publish-npm-${{ github.event.inputs.npm_package }}-${{ github.run_id }}

on:
  workflow_dispatch:
    inputs:
      npm_package:
        description: 'all = tout le scope ; sinon nom exact (ex. @portaki/module-train)'
        required: true
        default: all
        type: string

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "24"
  PNPM_VERSION: "9.15.4"
  NPM_REGISTRY: https://registry.npmjs.org

jobs:
  discover-packages:
    name: Discover npm module matrix
    runs-on: ubuntu-latest
    outputs:
      any: ${{ steps.set.outputs.any }}
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: set
        run: bash .github/scripts/discover-npm-module-matrix.sh >> "$GITHUB_OUTPUT"

  publish:
    name: ${{ matrix.job_label }}
    needs: [discover-packages]
    if: needs.discover-packages.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover-packages.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm workspace
        uses: PortakiApp/portaki-sdk/.github/actions/pnpm-workspace-setup@main
        with:
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
          registry-url: ${{ env.NPM_REGISTRY }}

      - name: Assert workspace has no file-protocol dependencies
        run: pnpm assert-no-file-deps

      - name: Publish ${{ matrix.package }}
        shell: bash
        run: |
          set -euo pipefail
          TARGET="${{ github.event.inputs.npm_package }}"
          PKG="${{ matrix.package }}"
          if [[ "${TARGET}" != "all" && "${TARGET}" != "${PKG}" ]]; then
            echo "Skip ${PKG} (sélection: ${TARGET})"
            exit 0
          fi
          pnpm publish --filter "${PKG}" --access public --no-git-checks
