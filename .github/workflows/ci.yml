name: Checks

on:
  push:
    branches:
      - develop
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

# Publication semver : matrices décrites par .github/scripts/discover-*-publish-matrix.sh ;
# npm ne dépend pas des jobs Java ; Maven reste après verify + découvertes coordonnées.

jobs:
  discover-java:
    name: Discover Java backends
    runs-on: ubuntu-latest
    outputs:
      any: ${{ steps.set.outputs.any }}
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: set
        run: bash .github/scripts/discover-java-backend-matrix.sh ci >> "$GITHUB_OUTPUT"

  discover-npm-publish:
    name: Discover npm publish matrix
    runs-on: ubuntu-latest
    outputs:
      any: ${{ steps.set.outputs.any }}
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: set
        run: bash .github/scripts/discover-npm-publish-matrix.sh >> "$GITHUB_OUTPUT"

  discover-maven-publish:
    name: Discover Maven publish matrix
    runs-on: ubuntu-latest
    outputs:
      any: ${{ steps.set.outputs.any }}
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: set
        run: bash .github/scripts/discover-maven-publish-matrix.sh >> "$GITHUB_OUTPUT"

  workspace-assert-file-deps:
    name: "Node — assert (no file: deps)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm workspace
        uses: PortakiApp/portaki-sdk/.github/actions/pnpm-workspace-setup@main
        with:
          node-version: "22"
          pnpm-version: "9.15.4"

      - name: Assert workspace has no file-protocol dependencies
        run: pnpm assert-no-file-deps

  workspace-validate-manifests:
    name: "Node — validate manifests"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm workspace
        uses: PortakiApp/portaki-sdk/.github/actions/pnpm-workspace-setup@main
        with:
          node-version: "22"
          pnpm-version: "9.15.4"

      - name: Validate module manifests
        run: pnpm validate:modules

  workspace-lint:
    name: "Node — lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm workspace
        uses: PortakiApp/portaki-sdk/.github/actions/pnpm-workspace-setup@main
        with:
          node-version: "22"
          pnpm-version: "9.15.4"

      - name: Lint (workspace)
        run: pnpm lint

  java-backend:
    name: ${{ matrix.job_label }}
    needs: [discover-java]
    if: needs.discover-java.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover-java.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maven (GPR) + JDK — SDK depuis Maven Central
        if: >
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository
        uses: PortakiApp/portaki-sdk/.github/actions/maven-gpr-install-java-sdk@main
        with:
          gpr-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout portaki-sdk (java-test-support)
        if: >
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/checkout@v4
        with:
          repository: PortakiApp/portaki-sdk
          path: .deps/portaki-sdk
          ref: main

      - name: Install portaki-module-sdk-test (not on Maven Central yet)
        if: >
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository
        run: mvn -B install -f .deps/portaki-sdk/sdk/java-test-support/pom.xml -DskipTests

      - name: Verify backend (Maven)
        if: >
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository
        working-directory: ${{ matrix.java_dir }}
        run: mvn -B verify

      - name: Skip Java on fork pull_request
        if: >
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name != github.repository
        run: echo "Java backend checks skipped (fork PR without GPR)."

  publish-npm-registry:
    name: ${{ matrix.job_label }}
    needs:
      - discover-npm-publish
      - workspace-assert-file-deps
      - workspace-validate-manifests
      - workspace-lint
    if: |
      always() &&
      github.repository == 'PortakiApp/portaki-modules' &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.discover-npm-publish.outputs.any == 'true' &&
      needs.workspace-assert-file-deps.result == 'success' &&
      needs.workspace-validate-manifests.result == 'success' &&
      needs.workspace-lint.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover-npm-publish.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm workspace
        uses: PortakiApp/portaki-sdk/.github/actions/pnpm-workspace-setup@main
        with:
          node-version: "22"
          pnpm-version: "9.15.4"
          registry-url: https://registry.npmjs.org

      - name: Install workspace (lockfile)
        run: pnpm install --frozen-lockfile

      - name: Dernière version sur npmjs
        id: remote
        run: |
          set -euo pipefail
          R="$(npm view "${{ matrix.npm_package_name }}" version --registry=https://registry.npmjs.org 2>/dev/null || true)"
          R="${R:-0.0.0}"
          echo "version=${R}" >> "$GITHUB_OUTPUT"

      - name: Gate semver (local > registre)
        id: gate
        run: |
          set -euo pipefail
          if ruby .github/scripts/semver_local_gt_remote.rb "${{ matrix.local_version }}" "${{ steps.remote.outputs.version }}"; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npmjs
        if: steps.gate.outputs.should_publish == 'true'
        run: >-
          pnpm publish
          --filter "${{ matrix.npm_package_name }}"
          --access public
          --no-git-checks

  publish-maven-registry:
    name: ${{ matrix.job_label }}
    needs:
      - discover-maven-publish
      - discover-java
      - java-backend
      - workspace-assert-file-deps
      - workspace-validate-manifests
      - workspace-lint
    if: |
      always() &&
      github.repository == 'PortakiApp/portaki-modules' &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.discover-maven-publish.outputs.any == 'true' &&
      needs.workspace-assert-file-deps.result == 'success' &&
      needs.workspace-validate-manifests.result == 'success' &&
      needs.workspace-lint.result == 'success' &&
      needs.discover-java.result == 'success' &&
      (needs.java-backend.result == 'success' || needs.java-backend.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
      MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover-maven-publish.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require Central + GPG secrets
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${MAVEN_USERNAME}" ] || [ -z "${MAVEN_PASSWORD}" ]; then
            echo "::notice::OSSRH_USERNAME / OSSRH_TOKEN absents — skip Maven Central publish."
            echo "has_secrets=false" >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -z "${GPG_PRIVATE_KEY}" ] || [ -z "${MAVEN_GPG_PASSPHRASE}" ]; then
            echo "::notice::GPG secrets absents — skip Maven Central publish."
            echo "has_secrets=false" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "has_secrets=true" >> "$GITHUB_ENV"

      - name: Cache bucket UTC (validité 1 h)
        if: env.has_secrets == 'true'
        id: cache_ttl
        run: echo "hour=$(date -u +%Y%m%d%H)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v4
        if: env.has_secrets == 'true'
        with:
          path: ~/.m2/repository
          key: m2-portaki-modules-ci-${{ runner.os }}-${{ hashFiles(format('{0}/pom.xml', matrix.java_dir)) }}-${{ steps.cache_ttl.outputs.hour }}

      - name: Set up JDK and Maven Central
        if: env.has_secrets == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Dernière release sur repo1.maven.org
        if: env.has_secrets == 'true'
        id: central
        run: |
          set -euo pipefail
          GP="${{ matrix.group_id }}"
          GP_PATH="${GP//.//}"
          URL="https://repo1.maven.org/maven2/${GP_PATH}/${{ matrix.artifact_id }}/maven-metadata.xml"
          LATEST="0.0.0"
          if curl -fsSL "$URL" -o /tmp/maven-metadata.xml 2>/dev/null; then
            LATEST="$(python3 -c "import re; t=open('/tmp/maven-metadata.xml', encoding='utf-8').read(); m=re.search(r'<latest>([^<]+)</latest>', t); print(m.group(1) if m else '0.0.0')")"
          fi
          echo "latest=${LATEST}" >> "$GITHUB_OUTPUT"

      - name: Gate semver (POM > Central)
        if: env.has_secrets == 'true'
        id: gate
        run: |
          set -euo pipefail
          if ruby .github/scripts/semver_local_gt_remote.rb "${{ matrix.pom_version }}" "${{ steps.central.outputs.latest }}"; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Maven Central
        if: env.has_secrets == 'true' && steps.gate.outputs.should_publish == 'true'
        working-directory: ${{ matrix.java_dir }}
        run: mvn --batch-mode -ntp deploy -DskipTests -P central-deploy
