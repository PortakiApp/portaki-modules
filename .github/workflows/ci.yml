name: CI

on:
  push:
    branches:
      - develop
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

jobs:
  checks:
    name: ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [node-workspace, java-backend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm workspace
        if: matrix.component == 'node-workspace'
        uses: PortakiApp/portaki-sdk/.github/actions/pnpm-workspace-setup@main
        with:
          node-version: "22"
          pnpm-version: "9.15.4"

      - name: Assert workspace has no file-protocol dependencies
        if: matrix.component == 'node-workspace'
        run: pnpm assert-no-file-deps

      - name: Validate module manifests
        if: matrix.component == 'node-workspace'
        run: pnpm validate:modules

      - name: Lint (workspace)
        if: matrix.component == 'node-workspace'
        run: pnpm lint

      - name: Checkout portaki-sdk (Java SDK — GPR artefact often absent until published)
        if: >
          matrix.component == 'java-backend' &&
          (github.event_name != 'pull_request' ||
           github.event.pull_request.head.repo.full_name == github.repository)
        uses: PortakiApp/portaki-sdk/.github/actions/checkout-portaki-sdk@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Maven (GPR) + install Java SDK locally
        if: >
          matrix.component == 'java-backend' &&
          (github.event_name != 'pull_request' ||
           github.event.pull_request.head.repo.full_name == github.repository)
        uses: PortakiApp/portaki-sdk/.github/actions/maven-gpr-install-java-sdk@main
        with:
          gpr-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify backend (Maven)
        if: >
          matrix.component == 'java-backend' &&
          (github.event_name != 'pull_request' ||
           github.event.pull_request.head.repo.full_name == github.repository)
        working-directory: modules/pre-arrival-form/backend
        run: mvn -B verify

      - name: Skip Java on fork pull_request
        if: >
          matrix.component == 'java-backend' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name != github.repository
        run: echo "Java backend checks skipped (fork PR without GPR)."
